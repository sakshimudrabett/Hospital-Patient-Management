<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management System</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="container">

    <!-- HEADER -->
    <header class="topbar">
      <h1>Hospital Management System</h1>
    </header>

    <!-- PATIENT FORM -->
    <section class="card">
      <h2>Create / Edit Patient</h2>
      <form id="createPatientForm" class="grid-form">
        <input type="text" id="firstName" placeholder="First name" required />
        <input type="text" id="lastName" placeholder="Last name" required />
        <input type="number" id="age" placeholder="Age" required />
        <input type="text" id="gender" placeholder="Gender" required />
        <button id="submitBtn" type="submit">Create Patient</button>
      </form>
    </section>

    <!-- APPOINTMENT FORM -->
    <section class="card">
      <h2>Create Appointment</h2>
      <form id="appointmentForm" class="grid-form">
        <input type="number" id="patientId" placeholder="Patient ID" required />
        <input type="text" id="doctorName" placeholder="Doctor Name" required />
        <input type="text" id="dateTime" placeholder="YYYY-MM-DD HH:MM" required />
        <button type="submit">Create Appointment</button>
      </form>
    </section>

    <!-- SEARCH -->
    <section class="card">
      <h2>Search</h2>
      <input type="text" id="searchName" placeholder="Search by name" />
    </section>

    <!-- PATIENT TABLE -->
    <section class="card">
      <h2>Patients</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>First</th>
            <th>Last</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="patientsTableBody"></tbody>
      </table>
    </section>

    <!-- APPOINTMENTS -->
    <section class="card">
      <h2>Appointments</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="appointmentsTableBody"></tbody>
      </table>
    </section>

    <!-- PATIENT HISTORY -->
    <section class="card">
      <h2>Patient History</h2>
      <p id="selectedPatientLabel">Click a patient to view history</p>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="patientHistoryBody"></tbody>
      </table>
    </section>

    <p id="message"></p>

  </main>

  <script src="./app.js" defer></script>
</body>
</html>
